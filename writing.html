<script>
    document.addEventListener('DOMContentLoaded', function() {
        const paragraphs = document.querySelectorAll('.fade-in');
        let index = 0;


        function fadeInNextParagraph() {
            if (index < paragraphs.length) {
                paragraphs[index].classList.add('visible');
                index++;
                setTimeout(fadeInNextParagraph, 100); // Adjust this value to change the delay between paragraphs
            }
        }

        fadeInNextParagraph();
    });
